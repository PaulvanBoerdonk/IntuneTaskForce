name: Publish IntuneTaskForce Modules

on:
  push:
    branches: [main]
    paths:
      - "**/*.psd1"

jobs:
  publish-to-gallery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Publish Modules to PowerShell Gallery
        env:
          NUGET_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        shell: pwsh
        run: |
          Set-PSRepository -Name 'PSGallery' -InstallationPolicy Trusted

          # 1. Find all module manifests (.psd1 files)
          $allManifests = Get-ChildItem -Path ./Modules -Filter "*.psd1" -Recurse

          # 2. Split them: First the sub-modules, then the main module
          $subModules = $allManifests | Where-Object { $_.BaseName -ne "IntuneTaskForce" }
          $mainModule = $allManifests | Where-Object { $_.BaseName -eq "IntuneTaskForce" }

          # Merge them in the correct order (main module last)
          $publishQueue = @($subModules) + @($mainModule)

          Write-Host "Found modules to evaluate: $($publishQueue.Count)"

          foreach ($manifest in $publishQueue) {
              $moduleName = $manifest.BaseName
              $moduleFolder = $manifest.Directory.FullName
              
              Write-Host "`n================================================="
              Write-Host "Evaluating module: $moduleName"
              Write-Host "================================================="

              # Read local version
              $localModule = Test-ModuleManifest -Path $manifest.FullName -ErrorAction Stop
              $localVersion = $localModule.Version
              Write-Host "Local version in Git: $localVersion"

              # Check online version
              $onlineModule = Find-Module -Name $moduleName -ErrorAction SilentlyContinue
              $shouldPublish = $false

              if ($null -eq $onlineModule) {
                  Write-Host "Module does not exist online yet. Preparing for initial publish..."
                  $shouldPublish = $true
              }
              elseif ($localVersion -gt $onlineModule.Version) {
                  Write-Host "New version found! (Online: $($onlineModule.Version) -> Local: $localVersion)"
                  $shouldPublish = $true
              }
              else {
                  Write-Host "Skipping: Local version ($localVersion) is not newer than online version ($($onlineModule.Version))."
              }

              # Publish if needed
              if ($shouldPublish) {
                  Write-Host "Publishing $moduleName to the PowerShell Gallery..."
                  try {
                      Publish-Module -Path $moduleFolder -NuGetApiKey $env:NUGET_API_KEY -ErrorAction Stop
                      Write-Host "✅ Successfully published!"
                      
                      # Small pause to give PSGallery time to process the newly uploaded module
                      Start-Sleep -Seconds 15 
                  }
                  catch {
                      # FIXED: Wrapped moduleName in curly braces to detach it from the colon
                      Write-Error "Error publishing ${moduleName}: $_"
                      throw $_
                  }
              }
          }
