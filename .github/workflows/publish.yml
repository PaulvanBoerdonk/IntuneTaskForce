name: Publish IntuneTaskForce Modules

on:
  push:
    branches: [main]
    paths:
      - "**/*.psd1"

jobs:
  publish-to-gallery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Publish Modules to PowerShell Gallery
        env:
          NUGET_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        shell: pwsh
        run: |
          Set-PSRepository -Name 'PSGallery' -InstallationPolicy Trusted

          # 1. Temporarily add our local Modules folder to PSModulePath 
          $localModulesPath = (Resolve-Path "./Modules").Path
          $env:PSModulePath = "$localModulesPath$([System.IO.Path]::PathSeparator)$env:PSModulePath"

          # 2. Find all module manifests (.psd1 files)
          $allManifests = Get-ChildItem -Path ./Modules -Filter "*.psd1" -Recurse

          # 3. Explicitly define the correct dependency order!
          # Authentication MUST be first. The main wrapper MUST be last.
          $publishOrder = @(
              "IntuneTaskForce.Authentication",
              "IntuneTaskForce.Autopilot",
              "IntuneTaskForce.BulkActions",
              "IntuneTaskForce.DeviceManagement",
              "IntuneTaskForce.Security",
              "IntuneTaskForce"
          )

          Write-Host "Found $($allManifests.Count) manifests. Processing in strict dependency order..."

          foreach ($moduleName in $publishOrder) {
              # Find the specific manifest for the module we want to process now
              $manifest = $allManifests | Where-Object { $_.BaseName -eq $moduleName } | Select-Object -First 1

              if (-not $manifest) {
                  Write-Warning "Manifest for $moduleName not found. Skipping."
                  continue
              }

              $moduleFolder = $manifest.Directory.FullName
              
              Write-Host "`n================================================="
              Write-Host "Evaluating module: $moduleName"
              Write-Host "================================================="

              # Read local version
              $localModule = Test-ModuleManifest -Path $manifest.FullName -ErrorAction Stop
              $localVersion = $localModule.Version
              Write-Host "Local version in Git: $localVersion"

              # Check online version
              $onlineModule = Find-Module -Name $moduleName -ErrorAction SilentlyContinue
              $shouldPublish = $false

              if ($null -eq $onlineModule) {
                  Write-Host "Module does not exist online yet. Preparing for initial publish..."
                  $shouldPublish = $true
              }
              elseif ($localVersion -gt $onlineModule.Version) {
                  Write-Host "New version found! (Online: $($onlineModule.Version) -> Local: $localVersion)"
                  $shouldPublish = $true
              }
              else {
                  Write-Host "Skipping: Local version ($localVersion) is not newer than online version ($($onlineModule.Version))."
              }

              # Publish if needed
              if ($shouldPublish) {
                  Write-Host "Publishing $moduleName to the PowerShell Gallery..."
                  try {
                      Publish-Module -Path $moduleFolder -NuGetApiKey $env:NUGET_API_KEY -ErrorAction Stop
                      Write-Host "✅ Successfully published!"
                      
                      # 4. Smart Wait Loop
                      # We must wait for the PSGallery to index this module so that 
                      # subsequent modules don't fail their dependency checks.
                      Write-Host "⏳ Waiting for PSGallery to index $moduleName..."
                      $maxRetries = 10
                      $retryCount = 0
                      $isIndexed = $false
                      
                      while ($retryCount -lt $maxRetries) {
                          Start-Sleep -Seconds 20
                          $check = Find-Module -Name $moduleName -ErrorAction SilentlyContinue
                          
                          if ($check -and $check.Version -ge $localVersion) {
                              Write-Host "✅ Successfully indexed by PSGallery!"
                              $isIndexed = $true
                              break
                          }
                          $retryCount++
                          Write-Host "Still waiting for indexing... ($retryCount/$maxRetries)"
                      }
                      
                      if (-not $isIndexed) {
                          Write-Warning "Gallery indexing is taking a long time. Continuing anyway, but dependencies might fail."
                      }
                  }
                  catch {
                      Write-Error "Error publishing ${moduleName}: $_"
                      throw $_
                  }
              }
          }
